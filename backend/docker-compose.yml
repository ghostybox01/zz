version: '3.8'

services:
  dashboard:
    build: .
    container_name: raven-dashboard
    ports:
      - "5000:5000"
    volumes:
      - ./ResultJS:/app/ResultJS:ro  # Read-only mount for scanner results
      - ./raven_results.db:/app/raven_results.db
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change-this-secret-key-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - raven-network

networks:
  raven-network:
    driver: bridge
